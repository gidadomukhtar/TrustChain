<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | TrustChain</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/utilities.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

    <div class="container settings-page">

        <h1>Settings</h1>

        <div class="glass settings-card">

            <h2>Organization</h2>

            <input type="text" placeholder="Organization Name">

            <input type="email" placeholder="Organization Email">

            <label for="organizationLogo">

                Organization Logo
                
                </label>

            <input id="organizationLogo" name="organizationLogo" type="file" title="Organization Logo" aria-label="Organization Logo">

            <hr>

            <h2>Security</h2>

            <input type="password" placeholder="Current Password">

            <input type="password" placeholder="New Password">

            <input type="password" placeholder="Confirm Password">

            <hr>

            <h2>Notifications</h2>

            <label><input type="checkbox" checked> Email Notifications</label>

            <label><input type="checkbox" checked> Verification Alerts</label>

            <label><input type="checkbox"> SMS Notifications</label>

            <hr>

            <button class="btn btn-primary">

Save Changes

</button>

        </div>

    </div>

    <script src="../js/settings.js"></script>

</body>

</html>
