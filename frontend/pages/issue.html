<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issue Digital Certificate | TrustChain</title>

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/utilities.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

<div class="container issue-page">

<div class="glass issue-form">

<div class="badge">
🟢 SECURE ISSUANCE PORTAL
</div>

<h1 style="margin-top:20px;">
Issue Trusted Digital Asset
</h1>

<p style="margin-bottom:40px;">
Generate blockchain-protected certificates verified by SINTEL AI™.
</p>

<div class="form-grid">

<div>

<label>Recipient Name</label>

<input
type="text"
placeholder="John Doe">

</div>

<div>

<label>Email Address</label>

<input
type="email"
placeholder="john@email.com">

</div>

<div>

<label>Institution</label>

<input
type="text"
placeholder="Federal University Dutsin-Ma">

</div>

<div>

<label>Certificate Type</label>

<select>

<option>Degree</option>

<option>Transcript</option>

<option>NYSC</option>

<option>Professional License</option>

<option>Employment Letter</option>

</select>

</div>

<div>

<label>Issue Date</label>

<input type="date">

</div>

<div>

<label>Expiry Date</label>

<input type="date">

</div>

</div>

<label>Description</label>

<textarea rows="5"
placeholder="Certificate description...">
</textarea>

<div class="issue-options">

<label>

<input type="checkbox" checked>

Generate Blockchain Hash

</label>

<label>

<input type="checkbox" checked>

Embed Secure QR Code

</label>

<label>

<input type="checkbox" checked>

Digitally Sign Asset

</label>

<label>

<input type="checkbox" checked>

Run SINTEL AI Validation

</label>

</div>

<button
id="issueBtn"
class="btn btn-primary">

Issue Certificate

</button>

</div>

<div
id="issueResult"
class="glass ai-summary"
style="display:none;margin-top:40px;">

<h2>
Certificate Successfully Issued
</h2>

<div class="trust-score">
100%
</div>

<p>

Certificate ID

<br>

<strong>
TC-2026-004728
</strong>

</p>

<p>

Blockchain Hash

<br>

<strong>
4fc1ae9d29af...
</strong>

</p>

<p>

QR Authentication

<br>

<strong style="color:#22c55e;">
ACTIVE
</strong>

</p>

<p>

SINTEL AI™

<br>

<strong style="color:#22c55e;">
VALIDATED
</strong>

</p>

</div>

</div>

<script src="../js/app.js"></script>
<script src="../js/issue.js"></script>
</body>

</html>
